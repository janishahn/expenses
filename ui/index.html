<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/expenses-mark.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#eeefe9"
      media="not all"
      data-ew-theme-color="light"
      data-ew-theme-background="rgb(238 239 233)"
    />
    <meta
      name="theme-color"
      content="#111511"
      media="all"
      data-ew-theme-color="dark"
      data-ew-theme-background="rgb(17 21 17)"
    />
    <script>
      ;(() => {
        const storageKey = "ew.theme.preference"
        const darkMediaQuery = "(prefers-color-scheme: dark)"
        const fallbackThemeChrome = {
          light: {
            themeColor: "#eeefe9",
            backgroundColor: "rgb(238 239 233)",
          },
          dark: {
            themeColor: "#111511",
            backgroundColor: "rgb(17 21 17)",
          },
        }
        const parsePreference = (value) =>
          value === "system" || value === "light" || value === "dark" ? value : null
        const readThemeChrome = (theme) => {
          const meta = document.querySelector(
            `meta[name="theme-color"][data-ew-theme-color="${theme}"]`
          )
          const fallback = fallbackThemeChrome[theme]
          return {
            themeColor: meta?.getAttribute("content") || fallback.themeColor,
            backgroundColor:
              meta?.getAttribute("data-ew-theme-background") ||
              fallback.backgroundColor,
          }
        }

        const storedPreference = parsePreference(
          window.localStorage.getItem(storageKey)
        )
        const preference = storedPreference ?? "system"
        const effectiveTheme =
          preference === "system"
            ? window.matchMedia(darkMediaQuery).matches
              ? "dark"
              : "light"
            : preference

        const root = document.documentElement
        const activeThemeChrome = readThemeChrome(effectiveTheme)
        root.dataset.theme = effectiveTheme
        root.style.colorScheme = effectiveTheme
        root.style.backgroundColor = activeThemeChrome.backgroundColor

        const activeThemeMeta = document.querySelector(
          `meta[name="theme-color"][data-ew-theme-color="${effectiveTheme}"]`
        )
        const inactiveTheme = effectiveTheme === "dark" ? "light" : "dark"
        const inactiveThemeChrome = readThemeChrome(inactiveTheme)
        const inactiveThemeMeta = document.querySelector(
          `meta[name="theme-color"][data-ew-theme-color="${inactiveTheme}"]`
        )
        if (activeThemeMeta) {
          activeThemeMeta.setAttribute("content", activeThemeChrome.themeColor)
          activeThemeMeta.setAttribute(
            "data-ew-theme-background",
            activeThemeChrome.backgroundColor
          )
          activeThemeMeta.setAttribute("media", "all")
        }
        if (inactiveThemeMeta) {
          inactiveThemeMeta.setAttribute("content", inactiveThemeChrome.themeColor)
          inactiveThemeMeta.setAttribute(
            "data-ew-theme-background",
            inactiveThemeChrome.backgroundColor
          )
          inactiveThemeMeta.setAttribute("media", "not all")
        }

        window.__EW_THEME_BOOTSTRAP__ = {
          preference,
          effectiveTheme,
        }
      })()
    </script>
    <title>Expenses</title>
    <script>
      window.addEventListener('pageshow', function(e) { if (e.persisted) location.reload(); });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
