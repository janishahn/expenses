services:
  expenses:
    build: .
    image: expenses:local
    ports:
      - "${EXPENSES_HTTP_PORT:-8000}:8000"
    environment:
      EXPENSES_ENV: "${EXPENSES_ENV:-Production}"
      EXPENSES_DATA_DIR: /data
      EXPENSES_LOG_DIR: /data/logs
      EXPENSES_LOG_LEVEL_STDOUT: "${EXPENSES_LOG_LEVEL_STDOUT:-INFO}"
      EXPENSES_FORWARDED_ALLOW_IPS: "${EXPENSES_FORWARDED_ALLOW_IPS:-127.0.0.1}"
      EXPENSES_TRUSTED_PROXY_IPS: "${EXPENSES_TRUSTED_PROXY_IPS:-}"
      EXPENSES_TIMEZONE: "${EXPENSES_TIMEZONE:-Europe/Berlin}"
      EXPENSES_CSRF_SECRET: "${EXPENSES_CSRF_SECRET:-}"
      EXPENSES_CSRF_SECRET_FILE: "${EXPENSES_CSRF_SECRET_FILE:-}"
      EXPENSES_LLM_ENABLED: "${EXPENSES_LLM_ENABLED:-false}"
      EXPENSES_LLM_BASE_URL: "${EXPENSES_LLM_BASE_URL:-}"
      EXPENSES_LLM_MODEL: "${EXPENSES_LLM_MODEL:-qwen}"
      EXPENSES_LLM_API_KEY: "${EXPENSES_LLM_API_KEY:-}"
      EXPENSES_LLM_TEMPERATURE: "${EXPENSES_LLM_TEMPERATURE:-}"
      EXPENSES_LLM_MAX_OUTPUT_TOKENS: "${EXPENSES_LLM_MAX_OUTPUT_TOKENS:-}"
    volumes:
      - expenses_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/mobile/status', timeout=2).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  expenses_data:
